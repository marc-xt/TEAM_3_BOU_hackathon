name: Mobile APK (EAS)

# Builds the CreditShield borrower app APK in the cloud (EAS) whenever the
# mobile/ app changes on main, or on demand. Requires an EXPO_TOKEN repo secret
# (Settings -> Secrets and variables -> Actions -> New repository secret).

on:
  push:
    branches: [main]
    paths: ["mobile/**"]
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        default: preview
        type: choice
        options: [preview, production]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Build APK
        run: eas build --platform android --profile ${{ github.event.inputs.profile || 'preview' }} --non-interactive --no-wait
